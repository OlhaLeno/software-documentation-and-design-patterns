<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Media Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-bg: #141414;
            --netflix-surface: #1f1f1f;
            --netflix-hover: #333333;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }
        
        body { background-color: var(--netflix-bg); color: var(--text-main); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .navbar { background-color: #000000 !important; border-bottom: 2px solid var(--netflix-red); }
        .navbar-brand { color: var(--netflix-red) !important; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 1.5rem; }

        .card { background-color: var(--netflix-surface); border: 1px solid #333; color: var(--text-main); }
        .card-header { border-bottom: 1px solid #333; }

        .table { color: var(--text-main) !important; border-color: #333; margin-bottom: 0; }
        .table th { background-color: #000000 !important; color: var(--text-muted) !important; font-weight: normal; border-bottom: 2px solid #333 !important; }
        .table td { color: var(--text-main) !important; border-bottom-color: #2b2b2b !important; vertical-align: middle; }
        .table-striped>tbody>tr:nth-of-type(odd)>* { background-color: #1a1a1a !important; color: var(--text-main) !important; }
        .table-striped>tbody>tr:nth-of-type(even)>* { background-color: var(--netflix-surface) !important; color: var(--text-main) !important; }
        .table-hover>tbody>tr:hover>* { background-color: var(--netflix-hover) !important; color: var(--text-main) !important; }

        .badge-movie { background-color: #007bff !important; color: #fff !important; font-size: 0.8rem; padding: 0.4em 0.6em; }
        .badge-serial { background-color: #198754 !important; color: #fff !important; font-size: 0.8rem; padding: 0.4em 0.6em; }
        .rating-star { color: #E50914; }

        .btn-netflix { background-color: var(--netflix-red); color: white; border: none; font-weight: 500; }
        .btn-netflix:hover { background-color: #b20710; color: white; }
        .btn-outline-light { border-color: #555 !important; color: #fff !important; }
        .btn-outline-light:hover { background-color: #fff !important; color: #000 !important; }
        
        .bi-pencil { color: #ffc107 !important; }
        .bi-eye { color: #0dcaf0 !important; } 
        .btn-outline-light:hover .bi-pencil, .btn-outline-light:hover .bi-eye { color: #000 !important; }

        .form-label { color: var(--text-muted); font-size: 0.9rem; }
        .form-control, .form-select { background-color: #2b2b2b; border: 1px solid #444; color: var(--text-main); }
        .form-control:focus, .form-select:focus { background-color: #141414; color: var(--text-main); border-color: var(--netflix-red); box-shadow: 0 0 0 0.2rem rgba(229, 9, 20, 0.3); }
        ::placeholder { color: #777 !important; }

        .flashes { position: fixed; top: 80px; right: 20px; z-index: 1000; max-width: 350px; }

        .modal-content { background-color: var(--netflix-surface); color: var(--text-main); border: 1px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .modal-header { border-bottom: 1px solid #333; }
        .modal-footer { border-top: 1px solid #333; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('content.index') }}">
            <i class="bi bi-play-btn-fill me-2"></i>NETFLIX Manager
        </a>
        <div class="d-flex gap-2">
            {% block nav_actions %}{% endblock %}
        </div>
    </div>
</nav>

<div class="flashes">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-dark border-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'warning' }} alert-dismissible fade show shadow text-white" style="background-color: #222;" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

<div class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
