{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg">
            <div class="card-header border-bottom-0 pt-4 px-4 pb-0">
                <h3 class="mb-0 fw-bold">
                    {% if item %}
                        <i class="bi bi-pencil-square text-warning me-2"></i>Edit Content
                    {% else %}
                        <i class="bi bi-plus-circle text-success me-2"></i>Add Content
                    {% endif %}
                </h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label">CONTENT TYPE</label>
                        {% if item %}
                            <input type="text" class="form-control fw-bold text-uppercase" value="{{ item.type }}" readonly style="background-color: #1a1a1a;">
                            <input type="hidden" name="type" value="{{ item.type }}">
                        {% else %}
                            <select class="form-select" name="type" id="typeSelect" onchange="updateFields()" required>
                                <option value="movie">Movie</option>
                                <option value="serial">Serial</option>
                            </select>
                        {% endif %}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">TITLE</label>
                        <input type="text" name="title" class="form-control" value="{{ item.title if item else '' }}" required placeholder="e.g. Stranger Things">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">DESCRIPTION</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Plot of the movie or serial...">{{ item.description if item else '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">GENRE</label>
                            <input type="text" name="genre" class="form-control" value="{{ item.genre if item else '' }}" placeholder="Sci-Fi, Drama">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">RATING (0-10)</label>
                            <input type="number" step="0.1" max="10" min="0" name="rating" class="form-control" value="{{ item.rating if item else '' }}" placeholder="8.5">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">DIRECTOR</label>
                        <input type="text" name="director" class="form-control" value="{{ item.director if item else '' }}">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">RELEASE DATE</label>
                        <input type="date" name="releaseDate" class="form-control" value="{{ item.releaseDate if item else '' }}">
                    </div>

                    <div id="movieData" style="display:none;" class="p-3 mt-2 rounded" style="background-color: #1a1a1a;">
                        <label class="form-label text-primary fw-bold"><i class="bi bi-film me-2"></i>MOVIE DETAILS</label>
                        <div class="mt-2">
                            <label class="form-label">Duration (minutes)</label>
                            <input type="number" name="duration" class="form-control" value="{{ item.duration if (item and item.type == 'movie') else '' }}" placeholder="120">
                        </div>
                    </div>

                    <div id="serialData" style="display:none;" class="p-3 mt-2 rounded" style="background-color: #1a1a1a;">
                        <label class="form-label text-success fw-bold"><i class="bi bi-tv me-2"></i>SERIAL DETAILS</label>
                        <div class="row mt-2">
                            <div class="col-6">
                                <label class="form-label">Seasons Count</label>
                                <input type="number" name="seasonsCount" class="form-control" value="{{ item.seasonsCount if (item and item.type == 'serial') else '' }}" placeholder="3">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Episodes Count</label>
                                <input type="number" name="episodesCount" class="form-control" value="{{ item.episodesCount if (item and item.type == 'serial') else '' }}" placeholder="24">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-5 pt-3 border-top" style="border-color: #333 !important;">
                        <a href="{{ url_for('content.index') }}" class="btn btn-outline-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-netflix px-4">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function updateFields() {
        const typeSelect = document.getElementById('typeSelect');
        const type = typeSelect ? typeSelect.value : "{{ item.type if item else 'movie' }}";
        
        const movieData = document.getElementById('movieData');
        const serialData = document.getElementById('serialData');
        
        if (movieData && serialData) {
            movieData.style.display = (type === 'movie') ? 'block' : 'none';
            serialData.style.display = (type === 'serial') ? 'block' : 'none';
        }
    }
    window.onload = updateFields;
</script>
{% endblock %}
